services:
  xiaohongshuritter:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: xiaohongshuritter:local
    container_name: xiaohongshuritter
    restart: unless-stopped
    init: true
    tty: true
    shm_size: "1gb"
    ports:
      - "${XHS_PORT:-18060}:18060"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./config/accounts.json:/app/config/accounts.json:ro
    environment:
      - XHS_ACCOUNT_CONFIG=/app/config/accounts.json
      - XHS_MAX_CONCURRENCY=${XHS_MAX_CONCURRENCY:-4}
      - XHS_ACCOUNT_MAX_CONCURRENCY=${XHS_ACCOUNT_MAX_CONCURRENCY:-1}
      - XHS_ACQUIRE_TIMEOUT=${XHS_ACQUIRE_TIMEOUT:-180s}
      - XHS_MAX_BROWSER_SESSIONS=${XHS_MAX_BROWSER_SESSIONS:-4}
      - XHS_BROWSER_JANITOR_INTERVAL=${XHS_BROWSER_JANITOR_INTERVAL:-2m}
      - XHS_BROWSER_PROCESS_WARN_LIMIT=${XHS_BROWSER_PROCESS_WARN_LIMIT:-24}
      - XHS_BROWSER_PROCESS_KILL_LIMIT=${XHS_BROWSER_PROCESS_KILL_LIMIT:-32}
      - XHS_ACCOUNT_QUEUE_CAPACITY=${XHS_ACCOUNT_QUEUE_CAPACITY:-3}
      - XHS_MAX_OUTSTANDING_JOBS=${XHS_MAX_OUTSTANDING_JOBS:-128}
      - XHS_ACCOUNT_COOLDOWN_FAILURES=${XHS_ACCOUNT_COOLDOWN_FAILURES:-3}
      - XHS_ACCOUNT_COOLDOWN_DURATION=${XHS_ACCOUNT_COOLDOWN_DURATION:-10m}
      - XHS_PROXY=${XHS_PROXY:-}
